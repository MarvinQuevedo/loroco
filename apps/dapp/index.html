<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Loroco dApp Console — exercise the full window.chia provider: offers, NFTs, CATs, DIDs, batch sends, coin analysis and signing."
    />
    <title>Loroco dApp Console</title>
    <!--
      Resolve the theme before first paint to avoid a flash of the wrong
      theme. Mirrors docs/theme.js: explicit user choice (localStorage
      "loroco-theme") wins, otherwise follow the OS preference.
    -->
    <script>
      (function () {
        try {
          var k = "loroco-theme";
          var v = localStorage.getItem(k);
          var theme =
            v === "dark" || v === "light"
              ? v
              : window.matchMedia &&
                  window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          /* private mode — default light */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
