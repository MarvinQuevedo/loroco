[package]
name = "sage-database"
version = "0.12.10"
edition = "2024"
license = "Apache-2.0"
description = "The SQLite database for Sage."
authors = ["Rigidity <me@rigidnetwork.com>"]
homepage = "https://github.com/rigidity/sage"
repository = "https://github.com/rigidity/sage"
readme = { workspace = true }
keywords = { workspace = true }
categories = { workspace = true }

[lints]
workspace = true

[features]
# `sqlite` enables the SQLite-backed Storage implementation via sqlx. This
# is the default for desktop/mobile targets. Disabling it strips all sqlx /
# libsqlite3-sys code so the crate can compile to wasm32-unknown-unknown,
# where storage is provided by the host via callbacks (IndexedDB).
default = ["sqlite"]
sqlite = ["dep:sqlx"]

[dependencies]
chia-wallet-sdk = { workspace = true }
sqlx = { workspace = true, features = ["sqlite"], optional = true }
thiserror = { workspace = true }
tracing = { workspace = true }
hex = { workspace = true }
